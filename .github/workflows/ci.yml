name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lua-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Install Luacheck
        run: luarocks install luacheck

      - name: Run Luacheck
        run: luacheck addon/ --config .luacheckrc

  python-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r training/requirements.txt
          pip install pytest
      - name: Test simc_apl_to_dataset (havoc)
        run: |
          python training/simc_apl_to_dataset.py --spec havoc --output /tmp/test_havoc.csv --samples 10
          test -f /tmp/test_havoc.csv
      - name: Test simc_apl_to_dataset (vengeance)
        run: |
          python training/simc_apl_to_dataset.py --spec vengeance --output /tmp/test_veng.csv --samples 10
          test -f /tmp/test_veng.csv
      - name: Test simc_apl_to_dataset (arms)
        run: |
          python training/simc_apl_to_dataset.py --spec arms --output /tmp/test_arms.csv --samples 10
          test -f /tmp/test_arms.csv
      - name: Test simc_apl_to_dataset (fury)
        run: |
          python training/simc_apl_to_dataset.py --spec fury --output /tmp/test_fury.csv --samples 10
          test -f /tmp/test_fury.csv
      - name: Run Python unit tests
        run: python -m pytest training/test_apl_parser.py -v
      - name: Train Arms DT+TM (validation)
        run: |
          python training/simc_apl_to_dataset.py --spec arms --output /tmp/arms_train.csv --samples 50
          python training/train_decision_tree.py \
            --input /tmp/arms_train.csv \
            --output-lua /tmp/WAR_Arms_DT.lua \
            --output-markov /tmp/WAR_Arms_TM.lua \
            --spec-id 71 --max-depth 5 --min-samples-leaf 5
          test -f /tmp/WAR_Arms_DT.lua
          test -f /tmp/WAR_Arms_TM.lua
      - name: Train Fury DT+TM (validation)
        run: |
          python training/simc_apl_to_dataset.py --spec fury --output /tmp/fury_train.csv --samples 50
          python training/train_decision_tree.py \
            --input /tmp/fury_train.csv \
            --output-lua /tmp/WAR_Fury_DT.lua \
            --output-markov /tmp/WAR_Fury_TM.lua \
            --spec-id 72 --max-depth 5 --min-samples-leaf 5
          test -f /tmp/WAR_Fury_DT.lua
          test -f /tmp/WAR_Fury_TM.lua

  lua-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Install busted
        run: luarocks install busted

      - name: Run Lua unit tests
        run: busted tests/ --verbose --pattern=test
